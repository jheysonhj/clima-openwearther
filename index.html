<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Weather App</title>
    <!-- Bootstrap 5 & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container text-center main-card p-4">
        <h1 class="neon-text mb-4"><i class="fa-solid fa-cloud-bolt"></i> CLIMA NEÓN</h1>
        
        <div class="input-group mb-4 shadow-neon">
            <input type="text" id="cityInput" class="form-control bg-black text-white border-0" placeholder="Escribe una ciudad...">
            <button class="btn btn-neon" id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="weatherContainer" class="row g-3 justify-content-center">
            <!-- Las tarjetas aparecerán aquí -->
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
